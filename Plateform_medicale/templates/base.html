<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plateforme medicale{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f8f4;
            --surface: #ffffff;
            --primary: #12885a;
            --primary-dark: #0b5d3b;
            --primary-accent: #16a34a;
            --primary-soft: #e7f6ef;
            --border: #d7e5dd;
            --text: #1f2933;
            --muted: #5f6f7d;
            --danger: #b42318;
            --success: #167a46;
            --warning: #9a6700;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 420px at 100% -10%, rgba(22, 163, 74, 0.07), transparent 60%),
                radial-gradient(700px 380px at -10% 110%, rgba(18, 136, 90, 0.06), transparent 60%),
                var(--bg);
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 14px rgba(11, 93, 59, 0.05);
        }

        .topbar,
        main {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 14px 0;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-dark);
            font-size: 20px;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .brand .pictogramme {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-accent) 100%);
            color: #ffffff;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(18, 136, 90, 0.30);
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        nav a,
        .button {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 9px 13px;
            border-radius: 9px;
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid transparent;
            background: transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
        }

        nav a:hover,
        .button:hover {
            background: var(--primary-soft);
            border-color: #c3e3d2;
            transform: translateY(-1px);
        }

        /* Menu mobile (case à cocher, sans JavaScript) */
        .menu-toggle-input { display: none; }

        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 42px;
            height: 42px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface);
            cursor: pointer;
        }

        .menu-toggle span {
            display: block;
            height: 2.5px;
            border-radius: 2px;
            background: var(--primary-dark);
            transition: transform 0.25s ease, opacity 0.2s ease;
        }

        main {
            padding: 32px 0 48px;
            animation: entree-page 0.45s ease-out both;
        }

        @keyframes entree-page {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        h1 {
            margin: 0 0 8px;
            color: var(--primary-dark);
            font-size: 30px;
            font-weight: 800;
            line-height: 1.2;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
        }

        .panel,
        .empty {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(11, 93, 59, 0.06);
        }

        .panel {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            color: var(--primary-dark);
            background: var(--primary-soft);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tbody tr {
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background: #f4fbf7;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .empty {
            padding: 28px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat {
            position: relative;
            display: block;
            text-decoration: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 18px 18px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(11, 93, 59, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            animation: entree-carte 0.5s ease-out both;
        }

        .grid .stat:nth-child(1) { animation-delay: 0.04s; }
        .grid .stat:nth-child(2) { animation-delay: 0.08s; }
        .grid .stat:nth-child(3) { animation-delay: 0.12s; }
        .grid .stat:nth-child(4) { animation-delay: 0.16s; }
        .grid .stat:nth-child(5) { animation-delay: 0.20s; }
        .grid .stat:nth-child(6) { animation-delay: 0.24s; }

        @keyframes entree-carte {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .stat::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-accent) 100%);
        }

        .stat:hover {
            transform: translateY(-4px);
            border-color: #bfe0cf;
            box-shadow: 0 14px 34px rgba(11, 93, 59, 0.13);
        }

        .stat strong {
            display: block;
            color: var(--primary-dark);
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat span {
            color: var(--muted);
            font-weight: 600;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #eef2f6;
            color: #40515f;
            font-size: 13px;
            font-weight: 700;
        }

        .badge.en_attente {
            background: #fff3cd;
            color: var(--warning);
        }

        .badge.validee,
        .badge.terminee {
            background: #dcfce7;
            color: var(--success);
        }

        .badge.refusee {
            background: #fee4e2;
            color: var(--danger);
        }

        form {
            max-width: 720px;
            padding: 26px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(11, 93, 59, 0.06);
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 700;
            font-size: 14px;
        }

        input,
        select,
        textarea {
            width: 100%;
            min-height: 44px;
            margin-bottom: 16px;
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font: inherit;
            background: #fbfdfc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input:hover,
        select:hover,
        textarea:hover {
            border-color: #b9d6c6;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-accent);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.13);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .button.primary {
            border-color: transparent;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-accent) 100%);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(18, 136, 90, 0.28);
        }

        .button.primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(18, 136, 90, 0.36);
        }

        .button.btn {
            min-height: 34px;
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
        }

        .button.btn-sm {
            min-height: 30px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .button.btn-primary {
            border-color: transparent;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-accent) 100%);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(18, 136, 90, 0.25);
        }

        .button.btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-color: transparent;
        }

        .button.btn-danger {
            border-color: transparent;
            background: #dc3545;
            color: #ffffff;
        }

        .button.btn-danger:hover {
            background: #bb2d3b;
            border-color: transparent;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .session {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .session .badge {
            background: var(--primary-soft);
            color: var(--primary-dark);
            border: 1px solid #c3e3d2;
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .menu-toggle { display: flex; }

            .topbar {
                flex-wrap: wrap;
                gap: 12px;
            }

            nav {
                order: 4;
                flex-basis: 100%;
                flex-direction: column;
                gap: 4px;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.35s ease;
            }

            .menu-toggle-input:checked ~ nav {
                max-height: 420px;
                padding-bottom: 10px;
            }

            .menu-toggle-input:checked + .menu-toggle span:nth-child(1) {
                transform: translateY(7.5px) rotate(45deg);
            }
            .menu-toggle-input:checked + .menu-toggle span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle-input:checked + .menu-toggle span:nth-child(3) {
                transform: translateY(-7.5px) rotate(-45deg);
            }

            nav a {
                justify-content: flex-start;
                min-height: 44px;
            }
        }

        @media (max-width: 560px) {
            .page-title {
                flex-direction: column;
                align-items: stretch;
            }

            h1 { font-size: 24px; }

            .session { margin-left: auto; }

            form { padding: 18px; }

            .actions .button { flex: 1; justify-content: center; }
        }

        /* Accessibilité : réduire les animations si demandé */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="topbar">
            <a class="brand" href="{% url 'dashboard' %}"><span class="pictogramme">✚</span>SantéSN</a>

            <input type="checkbox" id="menu-mobile" class="menu-toggle-input" aria-hidden="true">
            <label for="menu-mobile" class="menu-toggle" aria-label="Ouvrir le menu">
                <span></span><span></span><span></span>
            </label>

            <nav aria-label="Navigation principale">
                <a href="{% url 'liste_patients' %}">Patients</a>
                <a href="{% url 'liste_medecins' %}">Medecins</a>
                <a href="{% url 'liste_services' %}">Services</a>
                <a href="{% url 'liste_prises_en_charge' %}">Prises en charge</a>
                <a href="{% url 'liste_consultations' %}">Consultations</a>
                <a href="{% url 'liste_ordonnances' %}">Ordonnances</a>
            </nav>
            {% if user.is_authenticated %}
            <div class="session">
                <span class="badge">{{ current_role_label }}</span>
                <form method="post" action="{% url 'accounts:logout' %}" style="max-width:none;padding:0;border:0;background:transparent;box-shadow:none;">
                    {% csrf_token %}
                    <button type="submit" class="button btn">Déconnexion</button>
                </form>
            </div>
            {% endif %}
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
