{% extends "base.html" %}

{% block title %}Modifier Service - Plateforme medicale{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h1>Modifier Service</h1>
        <p class="subtitle">Modifiez les informations du service</p>
    </div>
</div>

<form method="post">
    {% csrf_token %}

    <div>
        <label for="nom">Nom du Service</label>
        <input 
            type="text" 
            id="nom" 
            name="nom" 
            required 
            value="{{ service.nom }}"
        >
    </div>

    <div>
        <label for="description">Description</label>
        <textarea 
            id="description" 
            name="description"
        >{{ service.description }}</textarea>
    </div>

    <div>
        <label for="prix">Prix (€)</label>
        <input 
            type="number" 
            id="prix" 
            name="prix" 
            step="0.01"
            required 
            value="{{ service.prix }}"
        >
    </div>

    <button type="submit" class="button primary">Enregistrer les modifications</button>
    <a href="{% url 'liste_services' %}" class="button">Retour</a>
</form>
{% endblock %}
