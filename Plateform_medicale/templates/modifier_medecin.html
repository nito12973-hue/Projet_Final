{% extends "base.html" %}

{% block title %}Modifier Médecin - Plateforme medicale{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h1>Modifier Médecin</h1>
        <p class="subtitle">Modifiez les informations du médecin</p>
    </div>
</div>

<form method="post">
    {% csrf_token %}

    <div>
        <label for="nom">Nom</label>
        <input 
            type="text" 
            id="nom" 
            name="nom" 
            required 
            value="{{ medecin.nom }}"
        >
    </div>

    <div>
        <label for="prenom">Prénom</label>
        <input 
            type="text" 
            id="prenom" 
            name="prenom" 
            required 
            value="{{ medecin.prenom }}"
        >
    </div>

    <div>
        <label for="specialite">Spécialité</label>
        <input 
            type="text" 
            id="specialite" 
            name="specialite" 
            required 
            value="{{ medecin.specialite }}"
        >
    </div>

    <div>
        <label for="telephone">Téléphone</label>
        <input 
            type="tel" 
            id="telephone" 
            name="telephone" 
            required 
            value="{{ medecin.telephone }}"
        >
    </div>

    <div>
        <label for="email">Email</label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            value="{{ medecin.email }}"
        >
    </div>

    <button type="submit" class="button primary">Enregistrer les modifications</button>
    <a href="{% url 'liste_medecins' %}" class="button">Retour</a>
</form>
{% endblock %}
