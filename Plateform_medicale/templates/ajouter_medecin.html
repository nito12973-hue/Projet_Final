{% extends "base.html" %}

{% block title %}Ajouter un Médecin - Plateforme medicale{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h1>Ajouter un Médecin</h1>
        <p class="subtitle">Enregistrez un nouveau professionnel de santé</p>
    </div>
</div>

<form method="post">
    {% csrf_token %}

    <div>
        <label for="nom">Nom</label>
        <input 
            type="text" 
            id="nom" 
            name="nom" 
            required 
            placeholder="Entrez le nom du médecin"
        >
    </div>

    <div>
        <label for="prenom">Prénom</label>
        <input 
            type="text" 
            id="prenom" 
            name="prenom" 
            required 
            placeholder="Entrez le prénom du médecin"
        >
    </div>

    <div>
        <label for="specialite">Spécialité</label>
        <input 
            type="text" 
            id="specialite" 
            name="specialite" 
            required 
            placeholder="Ex: Cardiologie, Pédiatrie, etc."
        >
    </div>

    <div>
        <label for="telephone">Téléphone</label>
        <input 
            type="tel" 
            id="telephone" 
            name="telephone" 
            required 
            placeholder="Ex: +33 6 12 34 56 78"
        >
    </div>

    <div>
        <label for="email">Email</label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="Ex: medecin@exemple.com"
        >
    </div>

    <button type="submit" class="button primary">Ajouter le Médecin</button>
    <a href="{% url 'liste_medecins' %}" class="button">Retour</a>
</form>
{% endblock %}
